name: neurotrap
description: "NeuroTrap - AI-Powered Smart Honeypot Detection System Mobile Dashboard"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.2.7
  cloud_firestore: ^5.6.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4
  firebase_messaging: ^15.1.3

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
#  go_router: ^14.2.7

  # Charts
  fl_chart: ^0.69.0

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2
  connectivity_plus: ^6.0.5

  # Notifications
  flutter_local_notifications: ^17.2.3

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: KdamThmorPro
      fonts:
        - asset: assets/fonts/KdamThmorPro-Regular.ttf